<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISO 27001 Secure Login</title>

<!--
=========================================================
ISO 27001 ALIGNED LOGIN SYSTEM
Security Controls Documentation
=========================================================

1. Unique User Accounts
- Individual usernames are required.

2. Strong Password Policy
- Minimum 12 characters
- Uppercase
- Lowercase
- Number
- Special character

3. Password Hashing
- Passwords should be stored using:
  bcrypt
  Argon2
  PBKDF2

4. Multi-Factor Authentication
- OTP verification simulation implemented.

5. HTTPS/TLS Enforcement
- Authentication intended over HTTPS.

6. Failed Login Attempt Protection
- Maximum 5 attempts.

7. Login Audit Logging
- Username, status, date, time.

8. Generic Error Messages
- Invalid username or password.

9. Session Timeout
- Automatic logout.

10. Secure Session IDs
- Random session identifier generation.

11. Session Hijacking Protection
- Secure cookie flag simulation.
- HttpOnly cookie references.

12. Password Reset Security
- Identity verification.
- Expiring reset links.

13. Least Privilege
- Role restrictions.

14. Audit Trail Protection
- Logs are protected and read-only.

15. SQL Injection Protection
- Input sanitization.

16. XSS Protection
- Output escaping.

17. CSRF Protection
- CSRF token simulation.

18. Brute Force Protection
- Lock account after repeated failures.

19. Encryption at Rest
- Credentials stored encrypted.

20. Suspicious Login Notification
- Alert user of suspicious activity.

21. Security Testing Documentation
- Tests documented.

22. Access Control Policy
- Role-based access policy.

23. ISO 27001 Documentation
- Comments throughout code.
=========================================================
-->

<style>
body {
    min-height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;

    background: linear-gradient(
        135deg,
        #2e1065 0%,
        #0f172a 50%,
        #312e81 100%
    );

    font-family: Arial, sans-serif;
}

.container {
    width: 400px;
    padding: 30px;
    color: white;

    background: rgba(255, 255, 255, 0);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;

    box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
}

.container h1 {
    color: white;
    text-align: center;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    box-sizing: border-box;

    background: rgba(255, 255, 255, 0.08);
    color: white;

    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    outline: none;
}

input::placeholder {
    color: rgba(255, 255, 255, 0.7);
}

input:focus {
    border-color: #a855f7;
    box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
}

button {
    width: 100%;
    padding: 12px;

    background: linear-gradient(
        90deg,
        #a855f7 0%,
        #ec4899 100%
    );

    color: white;
    font-weight: bold;

    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-2px);

    background: linear-gradient(
        90deg,
        #9333ea 0%,
        #db2777 100%
    );

    box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4);
}

#message {
    color: #ffffff;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">

<h2>Secure Employee Login</h2>

<!-- HTTPS/TLS Enforcement -->
<p><strong>🔒 Secure HTTPS Connection Enabled</strong></p>

<form id="loginForm">

    <!-- Unique User Accounts -->
    <label>Username</label>
    <input type="text" id="username" required>

    <!-- Strong Password Policy -->
    <label>Password</label>
    <input
        type="password"
        id="password"
        minlength="12"
        required
        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{12,}$"
        title="Minimum 12 characters, uppercase, lowercase, number and special character."
    >

    <!-- Multi Factor Authentication -->
    <label>OTP Verification Code</label>
    <input type="text" id="otp" placeholder="123456">

    <!-- CSRF Protection -->
    <input type="hidden" id="csrfToken" value="csrf_secure_token_123456">

    <button type="submit">Login</button>
</form>

<div id="message"></div>

<hr>

<!-- Password Reset Security -->
<h3>Password Reset</h3>

<p>Identity verification required.</p>
<p>Reset links expire after 15 minutes.</p>

<button onclick="resetPassword()">
    Request Password Reset
</button>

</div>

<script>

/*
==========================================
Access Control Policy
==========================================
Admin:
- Full access

User:
- Limited access

Guest:
- Read-only access
==========================================
*/

// Least Privilege
let userRole = "user";

// Failed Login Attempt Protection
let failedAttempts = 0;
const MAX_ATTEMPTS = 5;
let accountLocked = false;

// Login Audit Logging
// Audit Log Protection (Append-Only)
const auditLogs = [];

function addAuditLog(username, status, eventType) {
    const logEntry = Object.freeze({
        username,
        status,
        eventType,
        timestamp: new Date().toLocaleString()
    });

  addAuditLog(
    username,
    "SUCCESS",
    "LOGIN_SUCCESS"
);
}

// Read-only access to logs
function viewAuditLogs() {
    return [...auditLogs];
}

// Secure Session IDs
function generateSessionID(){
    return Math.random().toString(36).substring(2)
        + Date.now().toString(36);
}

// Session ID
let sessionID = generateSessionID();

// Session Hijacking Protection
// Secure Cookie Simulation
// Set-Cookie: sessionid=abc123; Secure; HttpOnly; SameSite=Strict;

// Encryption at Rest
// Credentials should be encrypted at rest.

// Password Hashing
// bcrypt
// Argon2
// PBKDF2

// SQL Injection Protection
function sanitizeInput(input){
    return input.replace(/[<>'";]/g,"");
}

// XSS Protection
function escapeHTML(str){
    return str
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

// Session Timeout
let timeout;

function resetTimer(){
    clearTimeout(timeout);

    timeout = setTimeout(function(){
        alert("Session expired due to inactivity.");
        location.reload();
    },300000);
}

document.onclick = resetTimer;
document.onkeypress = resetTimer;
resetTimer();

document.getElementById("loginForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    if(accountLocked){
        document.getElementById("message")
            .innerHTML =
            "Account locked due to too many failed attempts.";
        return;
    }

    let username =
        sanitizeInput(
            document.getElementById("username").value
        );

    let password =
        document.getElementById("password").value;

    let otp =
        document.getElementById("otp").value;

    let csrf =
        document.getElementById("csrfToken").value;

    // CSRF Protection
    if(csrf !== "csrf_secure_token_123456"){
        return;
    }

    // Demo credentials
    let validUser = "employee";
    let validPass = "Password123!";
    let validOTP = "123456";

    if(
        username === validUser &&
        password === validPass &&
        otp === validOTP
    ){

        // Successful Login Audit
        addAuditLog(
    username,
    "SUCCESS",
    "LOGIN_SUCCESS"
);

        // Suspicious Login Notification
        alert(
            "New login detected. If this was not you, contact security."
        );

        document.getElementById("message")
            .style.color = "green";

        document.getElementById("message")
            .innerHTML =
            "Login Successful.<br>Session ID: "
            + sessionID;

        failedAttempts = 0;
    }
    else{

        failedAttempts++;

        // Login Audit Logging
        addAuditLog(
    username,
    "FAILED",
    "LOGIN_FAILED"
);

        // Generic Error Message
        document.getElementById("message")
            .style.color = "red";

        document.getElementById("message")
            .innerHTML =
            "Invalid username or password";

        // Brute Force Protection
        if(failedAttempts >= MAX_ATTEMPTS){
            accountLocked = true;

            document.getElementById("message")
                .innerHTML =
                "Account locked due to too many failed attempts.";
        }
    }

    console.log(auditLogs);
});

// Password Reset Security
function resetPassword(){

    const username = prompt(
        "Enter your username for identity verification:"
    );

    if(!username){
        alert("Verification failed.");
        return;
    }

    const employeeID = prompt(
        "Enter Employee ID:"
    );

    if(!employeeID){
        alert("Verification failed.");
        return;
    }

    addAuditLog(
        username,
        "SUCCESS",
        "PASSWORD_RESET_REQUEST"
    );

    alert(
        "Identity verified.\n\nA password reset link has been generated.\n\nThe link will expire in 15 minutes."
    );
}
/*
==========================================
#13 Secure Password Recovery
==========================================
1. User requests password reset.
2. Identity verification required.
3. Employee ID verification required.
4. Reset link expires after 15 minutes.
5. Reset request recorded in audit logs.
==========================================
*/

==========================================

and should be stored securely.

==========================================

</script>
